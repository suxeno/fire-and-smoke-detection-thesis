# DETR-Hybrid Configuration - CNN Backbone + Superpixel Features

# Model Architecture
model_name: 'detr_hybrid'

# Backbone
backbone: 'resnet50'  # Options: resnet18, resnet34, resnet50, resnet101
dilation: true  # Use dilated convolutions in last stage
position_embedding: 'sine'  # Options: sine, learned
masks: false  # No segmentation masks for detection

# Transformer
hidden_dim: 256  # Model dimension
dropout: 0.1
nheads: 8  # Number of attention heads
dim_feedforward: 2048  # FFN dimension
enc_layers: 6  # Number of encoder layers
dec_layers: 6  # Number of decoder layers
pre_norm: false  # Pre-normalization in transformer
num_queries: 100  # Number of object queries

# SLIC Superpixel Settings
n_superpixels: 300  # Number of superpixels per image (primary scale)
slic_compactness: 10.0  # SLIC compactness (higher = more regular shape)
use_multiscale: true  # Set to true for multi-scale superpixels
superpixel_scales: [150, 300, 600]  # Scales for multi-scale mode

# Dataset
dataset_file: 'fire_smoke'
num_classes: 2  # fire, smoke
subset: 'CV'  # Options: CV, UAV, RS, or '' for all

# Data Paths
use_sample: true  # Set to false for full dataset
data_path: 'datasets_sample'

# Data Augmentation
scales: [480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800]
max_size: 1333

# Training
lr: 1.0e-4
lr_backbone: 1.0e-5  # Lower LR for pretrained backbone
weight_decay: 0.05  
clip_max_norm: 0.1

lr_drop: 120
epochs: 150

batch_size: 4  # Limited by backbone memory
num_workers: 4

# Loss weights
set_cost_class: 1
set_cost_bbox: 5
set_cost_giou: 2

bbox_loss_coef: 5
giou_loss_coef: 2
eos_coef: 0.1

aux_loss: true

# Validation
eval_every: 1

# System
device: 'cuda'
seed: 69
output_dir: 'outputs/detr_hybrid'
resume: ''
start_epoch: 0

# Distributed
world_size: 1
dist_url: 'env://'
distributed: false

# Evaluation
eval: false
visualize: false

# Logging
print_freq: 100
tensorboard: true
wandb: false
wandb_project: 'fire-smoke-detection'
wandb_run_name: 'detr-hybrid'

# Notes:
# - Uses ResNet50 backbone for learned features
# - Also extracts 69D handcrafted superpixel features per superpixel:
#   * RGB color: mean, std, range (9D)
#   * LAB color: mean, std, range (9D)
#   * HSV color: mean, std, range (9D)
#   * Sobel gradient: mean_x, std_x, mean_y, std_y (4D)
#   * GLCM texture: contrast, energy, homogeneity, entropy (4D)
#   * LBP histogram: 16-bin normalized (16D)
#   * HOG descriptor: 8-bin normalized (8D)
#   * Shape: var_y, var_x, cov, area (4D)
#   * Position: centroid_y, centroid_x (2D)
#   * Neighbor: color_diff, texture_diff, boundary_strength, degree (4D)
# - Fuses CNN and handcrafted features per superpixel
# - Multi-scale mode extracts features from 3 superpixel scales (150, 300, 600)
# - Superpixels reduce tokens: ~2000 pixels -> ~300 superpixels
# - For comparison:
#   - detr_baseline.yaml: Standard DETR (CNN only, no superpixels)
#   - detr_slic.yaml: Superpixel-only (no CNN backbone)
