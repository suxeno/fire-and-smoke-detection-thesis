# DETR Baseline Configuration for Fire and Smoke Detection

# Model Architecture
model_name: 'detr_baseline'
use_slic: false  # Disable SLIC (use standard DETR)

# Backbone
backbone: 'resnet50'  # Options: resnet18, resnet34, resnet50, resnet101
dilation: false  # Use dilated convolutions in last stage
position_embedding: 'sine'  # Options: sine, learned
masks: false  # No segmentation masks for detection

# Transformer
hidden_dim: 256  # Model dimension
dropout: 0.1
nheads: 8  # Number of attention heads
dim_feedforward: 2048  # FFN dimension
enc_layers: 6  # Number of encoder layers
dec_layers: 6  # Number of decoder layers
pre_norm: false  # Pre-normalization in transformer
num_queries: 100  # Number of object queries

# Dataset
dataset_file: 'fire_smoke'  # Custom dataset
num_classes: 2  # fire, smoke

# Data Paths - Easy switching between sample and full dataset
use_sample: false  # Set to false for full dataset
data_path: 'datasets'  # Change to 'datasets' for full dataset

# Data Augmentation (minimal for large dataset)
scales: [480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800]  # Multi-scale training
max_size: 1333  # Maximum image dimension

# Training
# Optimizer
lr: 1.0e-4  # Learning rate
lr_backbone: 1.0e-5  # Backbone learning rate (lower for pretrained)
weight_decay: 1.0e-4
clip_max_norm: 0.1  # Gradient clipping

# Learning rate schedule
lr_drop: 40  # Epoch to drop learning rate
epochs: 50  # Total training epochs

# Batch and workers
batch_size: 4  # Batch size per GPU (baseline is more memory intensive)
num_workers: 4  # Data loading workers

# Loss weights
set_cost_class: 1  # Classification cost in matching
set_cost_bbox: 5  # L1 bbox cost in matching
set_cost_giou: 2  # GIoU cost in matching

bbox_loss_coef: 5  # L1 bbox loss weight
giou_loss_coef: 2  # GIoU loss weight
eos_coef: 0.1  # No-object class weight

aux_loss: true  # Auxiliary decoding losses (improves training)

# Validation
eval_every: 5  # Evaluate every N epochs
save_every: 10  # Save checkpoint every N epochs

# System
device: 'cuda'  # Options: cuda, cpu
seed: 42
output_dir: 'outputs/detr_baseline'  # Output directory for this experiment
resume: ''  # Path to checkpoint to resume from (empty for fresh start)
start_epoch: 0

# Distributed Training (optional)
world_size: 1  # Number of GPUs
dist_url: 'env://'  # Distributed URL
distributed: false  # Enable for multi-GPU training

# Evaluation
eval: false  # Set true for evaluation-only mode
visualize: false  # Visualize predictions during evaluation

# Logging
print_freq: 100  # Print training stats every N iterations
tensorboard: true  # Enable tensorboard logging
wandb: false  # Enable Weights & Biases logging
wandb_project: 'fire-smoke-detection'  # WandB project name
wandb_run_name: 'detr-baseline-initial'  # WandB run name

# Notes for Baseline Training:
# 1. This is standard DETR without SLIC superpixels
# 2. Use for benchmark comparison with DETR-SLIC
# 3. Expected to be SLOWER than DETR-SLIC (processes all pixels)
# 4. Should achieve similar or slightly better accuracy (more detail)
# 5. Baseline is important for your thesis to show SLIC efficiency gains
# 6. Memory usage: Higher than DETR-SLIC due to full pixel-level encoding
# 7. Training time on sample: ~4-5 hours (slower than SLIC version)
#
# Comparison Metrics:
# - Training time per epoch
# - Inference time per image
# - GPU memory usage
# - mAP@0.5, mAP@0.75
# - Model parameters
# - FLOPs